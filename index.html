<?xml version="1.0" encoding="utf-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">

<head>
 <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>Vertex BOM Export Widget</title>

    <meta name="author" content="DSIS" />
    <meta name="description" content="DSIS Vertex Export Widget with Tree Expansion" />
    <meta name="apiVersion" content="1.3" />
    <meta name="debugMode" content="true" />
    <meta name="strictMode" content="false" />

    <link rel="stylesheet" type="text/css" href="styles/Main.css" />
    <script type="text/javascript" src="scripts/Main.js"></script>

    <script type="text/javascript">
        /**
         * Wait for the widget object to be fully loaded by the platform
         * before executing the main logic.
         */
        function widgetLoading() {
            if (typeof widget !== 'undefined') {
                executeWidgetCode();
            } else {
                setTimeout(widgetLoading, 100);
            }
        }
        widgetLoading();
    </script>
</head>

<body>
    <div id="widget-container">
        
        <div id="drop-zone-ui">
            <div class="drop-icon-container">
                <span class="fonticon fonticon-drag-drop"></span>
            </div>
            <h2>Vertex Data Export</h2>
            <p>Drop Here to Send Data to Vertex</p>
        </div>

        <div id="content-display" style="display:none;">
            </div>
    </div>
</body>

</html>
